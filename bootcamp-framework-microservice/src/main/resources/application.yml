spring:
  application:
    name: bootcamp-framework-microservice
  threads:
    virtual:
      enabled: true
  config:
    import:
      - optional:nacos:application-redis.yml?group=BOOTCAMP-COMMON&refreshEnabled=true
      - optional:nacos:${spring.application.name}.yml?group=BOOTCAMP&refreshEnabled=true
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      username: nacos
      password: nacos
      discovery:
        namespace: 26b5909e-699a-419a-8ea8-2655c63009a3
        service: ${spring.application.name}
        group: BOOTCAMP
      config:
        namespace: 26b5909e-699a-419a-8ea8-2655c63009a3
        group: BOOTCAMP
        file-extension: yml
    loadbalancer:
      nacos:
        enabled: true
    openfeign:
      circuitbreaker:
        enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000
          jwk-set-uri: http://localhost:9000/oauth2/jwks

management:
  endpoint:
    shutdown:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "health,info,shutdown,prometheus,metrics,traces"
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
  metrics:
    tags:
      application: ${spring.application.name}

feign:
  sentinel:
    enabled: true

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: ${spring.application.name}
    customized-trace-topic: bootcamp-producer
    send-message-timeout: 10000

bootcamp:
  news:
    trending:
      enabled: true
      max-stories: 10
      schedule-fixed-delay-millis: 1800000
      request-timeout-millis: 10000
      feed-urls:
        - https://news.google.com/rss/headlines/section/topic/WORLD?hl=en-US&gl=US&ceid=US:en
        - https://feeds.bbci.co.uk/news/world/rss.xml
