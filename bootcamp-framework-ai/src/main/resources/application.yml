server:
  port: 8082

spring:
  application:
    name: bootcamp-framework-ai
  threads:
    virtual:
      enabled: true
  config:
    import:
      - optional:nacos:bootcamp-framework-ai.yml?group=BOOTCAMP&refreshEnabled=true
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      username: nacos
      password: nacos
      discovery:
        namespace: <ai-nacos-namespace-uuid>
        group: BOOTCAMP
      config:
        namespace: <ai-nacos-namespace-uuid>
        group: BOOTCAMP
        file-extension: yml
    sentinel:
      transport:
        dashboard: 127.0.0.1:8858
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000
          jwk-set-uri: http://localhost:9000/oauth2/jwks
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      chat:
        options:
          model: gpt-4o-mini
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      redis:
        index: bootcamp-ai-index
        prefix: "ai:"
        initialize-schema: true

management:
  endpoint:
    shutdown:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "health,info,shutdown,prometheus,metrics,traces"
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
  metrics:
    tags:
      application: ${spring.application.name}
